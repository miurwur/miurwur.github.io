on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-and-publish-site
        cubes:
          - name: build-mkdocs-site
            image: docker.io/library/python:3.14-slim
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              - cd src && mkdocs build -f mkdocs.yml -d ./site 
              - echo "Сайт собран в папке ./site"
              - ls -la ./site
          
          - name: publish-to-release-branch
            script:
              - git checkout -b release
              # 1. Очищаем ветку от лишних исходников (кроме папки с сайтом)
              - git rm -rf . 
              # 2. Перемещаем содержимое собранного сайта в корень
              - mv src/site/* .
              # 3. Добавляем все файлы и пушим
              - git add .
              - "git commit -m \"feat: автоматическое обновление сайта\""
              - "git push origin release -f"