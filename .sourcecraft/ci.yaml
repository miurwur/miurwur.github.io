on:
  push:
    workflows: build-site
    filter:
      branches: main

workflows:
  build-site:
    tasks:
      - name: build-and-publish-site
        cubes:
          - name: build-mkdocs-site
            image: docker.io/library/python:3.14-slim
            script:
              - python -m pip install --upgrade pip
              - "if [ -f requirements.txt ]; then pip install -r requirements.txt; fi"
              - cd src && mkdocs build -f mkdocs.yml -d ./site 
              - echo "Сайт собран в папке ./site"
              - ls -la ./site
          
          - name: publish-to-release-branch
            script:
              # Переключаемся на ветку release (создаем, если нет)
              - git checkout -b release || git checkout release
              
              # 1. Удаляем абсолютно всё из ветки, чтобы не было конфликтов
              - git rm -rf .
              
              # 2. Копируем СОДЕРЖИМОЕ папки site в корень репозитория
              # Точка после слэша (./) критически важна!
              - cp -R src/site/. ./
              
              # 3. На всякий случай удаляем саму папку src, если она скопировалась
              - rm -rf src
              
              # 4. Добавляем всё, фиксируем и пушим
              - git add .
              - "git commit -m \"feat: автоматическое обновление сайта\""
              - "git push origin release -f"
           
            # script:
            #   - git checkout -b release
            #   - git add src/site
            #   - "git commit -m \"feat: автоматическое обновление сайта\""
            #   - "git push origin release -f"